  <!-- back mountain -->
  <path d="M 60 232 L 140 118 L 200 200 L 230 165 L 300 232 Z" fill="#7C8B72"/>

  <!-- front mountains -->
  <path d="M 45 236 L 128 128 L 168 178 L 195 145 L 260 236 Z" fill="#3F4E3A"/>
  <path d="M 128 128 L 116 154 L 140 154 Z" fill="#F7F2E9"/>
  <path d="M 195 145 L 185 165 L 205 165 Z" fill="#F7F2E9"/>

  <!-- tree line -->
  <g fill="#2E3B2F">
