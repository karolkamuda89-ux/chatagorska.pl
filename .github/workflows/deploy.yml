name: Deploy Website via FTP

on:
  push:
    branches:
      - main  # Jeśli Twoja główna gałąź to master, zmień na master

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend  # Ta linijka mówi GitHubowi: "Wejdź najpierw do folderu frontend!"

    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies and Build
      run: |
        npm install
        npm run build

    - name: Sync files to Cyberfolks
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./frontend/dist/  # Wskazujemy precyzyjną ścieżkę do zbudowanego Reacta
        server-dir: domains/chatagorska.pl/public_html/